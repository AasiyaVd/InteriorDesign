/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Poppins',sans-serif;
  background:#fff;
  color:#f5f5f5;
  overflow:hidden;
}

/* NAVBAR */
.navbar{
  height:60px;
  background:rgba(75,0,7);
  border-bottom:1px solid rgba(255,215,160,0.15);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  font-family:'Cormorant Garamond',serif;
  letter-spacing:1px;
  font-size:20px;
}

/* RIGHT ACTION GROUP */
.nav-right{
  display:flex;
  align-items:center;
  gap:12px;
}

/* RENDER BUTTON (PRIMARY) */
.render-nav-btn{
  background:rgba(75,0,7);
  border:1px solid rgba(255,215,160,0.45);
  color:#d4af37;
  padding:8px 16px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}

.render-nav-btn:hover{
  background:#d4af37;
  color:#000;
}

/* ICON BUTTONS */
.nav-icon{
  background:transparent;
  border:1px solid rgba(255,215,160,0.25);
  width:36px;
  height:36px;
  border-radius:8px;
  color:#d4af37;
  cursor:pointer;
  transition:0.3s;
}

.nav-icon:hover{
  background:#d4af37;
  color:#000;
}

/* DANGER ACTION (DELETE) */
.nav-icon.danger{
  color:#d4af37;
  border-color:rgba(178,58,58,0.5);
}

.nav-icon.danger:hover{
  background:#b23a3a;
  color:#fff;
}

/* APP LAYOUT */
.app{
  display:grid;
  grid-template-columns:50px 0px 1fr; /* sidebar | toolpanel | canvas */
  height:calc(100vh - 60px);
  transition: grid-template-columns .35s ease;
}

/* SIDEBAR */
.sidebar{
  background:rgba(75, 0, 7);
  border-right:1px solid rgba(255,215,160,0.12);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:26px;
  width: 50px;
}

.side-btn{
  font-size:20px;
  color:#d4af37;
  cursor:pointer;
  transition:0.3s;
  background:rgba(75, 0, 7);
  border: none;
}

.sidebar i:hover{
  color:#f5f4f2
}

/* CANVAS */
.canvas-area{
  position:relative;
  background:#f5f4f2;
  margin:15px;
  border-radius:22px;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  height:95%;
  transition: .35s ease; /* smooth resize */
}

/* FLOATING ACTION BAR */
.action-bar{
  position:absolute;
  bottom:24px;
  right:24px;
  background:#111;
  border:1px solid rgba(255,215,160,0.2);
  border-radius:12px;
  padding:8px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.action-bar button{
  background:#0e0e0e;
  border:1px solid rgba(255,215,160,0.25);
  color:#f5f5f5;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}

.action-bar button:hover{
  background:#d4af37;
  color:#000;
}

.logo-group{display:flex;gap:10px}
.crown-img{height:48px}
.label-img{
height:30px;
margin-top: 10px;
}

/* PROJECT TITLE (CENTER) */
.project-title-wrapper{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.project-title-input{
  background:transparent;
  border:none;
  outline:none;
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
  letter-spacing:1px;
  color:#f5f5f5;
  padding:4px 10px;
  border-radius:6px;
  transition:0.3s;
  min-width:220px;
}

/* Hover & Focus */
.project-title-input:hover{
  background:rgba(255,255,255,0.06);
}

.project-title-input:focus{
  background:rgba(255,255,255,0.1);
  box-shadow:0 0 0 1px rgba(255,215,160,0.4);
}

.sidebar i.active{
  color:#d4af37;
}

.canvas{
  width:100%;height:100%;
  background:#f5f4f2;border-radius:20px;
  position:relative;display:flex;justify-content:center;align-items:center
}

#room{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;border-radius:20px
}
.category-item{
  padding:12px;border-radius:8px;background:#e9e7e3;
  cursor:pointer;font-size:14px
}
.category-item:hover{background:#ddd}
.furniture-thumb{width:100%;border-radius:10px}

.furniture-card{
  background:#f5f4f2;
  border-radius:14px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  cursor:pointer;
  transition:.25s ease;
}

.furniture-card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 25px rgba(0,0,0,.08);
}

.furniture-card img{
  width:100%;
  border-radius:12px;
}

.furniture-name{

  font-size:14px;
  color:#4b0007;
  letter-spacing:.3px;
}

#room{
  pointer-events:none;
    z-index:1;

}

img {
  -webkit-user-drag: none;
  -khtml-user-drag: none;
  -moz-user-drag: none;
  -o-user-drag: none;
  -user-drag: none;

}
.canvas {
  user-select: none;
}
.canvas-item{
  height:auto;
  max-width:none;  
  transition: width .05s linear;
}

.canvas-item.selected{
  outline:2px solid #c0a062;
  outline-offset:4px;
}
.resize-handle{
  width:12px;
  height:12px;
  background:#c0a062;
  border-radius:50%;
  position:absolute;
  right:-6px;
  bottom:-6px;
  cursor:nwse-resize;
}
.rotate-btn{
  position:absolute;
  top:-12px;
  left:-12px;
  width:26px;
  height:26px;
  border-radius:50%;
  background:#c0a062;
  color:#4b0007;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:30;
  font-size:13px;
}

.rotate-btn:hover{
  background:#d6bb6e;
}

.canvas-wrapper{
  position:absolute;
  z-index:10;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:2px;
  box-sizing:content-box;
}

.canvas-wrapper.selected{
  outline:2px solid #c0a062;
}

.delete-btn{
  position:absolute;
  top:-11px;
  right:-11px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:#6b0008;
  color:#fff;
  font-size:16px;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:20;
}

.canvas-wrapper.selected .delete-btn{
  display:flex;
}

.canvas-wrapper img{
  display:block;              /* removes inline gap */
  max-width:100%;
  height:auto;
    position:relative;
  z-index:1;
}

#room{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  z-index:1;
  pointer-events:none;
}

#furniture-layer{
  position:absolute;
  inset:0;
  z-index:5;
}

/* TOOL PANEL */
.tool-panel{
  background:#f5f4f2;
  border-right:1px solid rgba(0,0,0,.08);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  display: flex;
  flex-direction: column;
}

.tool-panel.active{width:260px}

.tool-panel-header{
  padding:18px;font-size:14px;font-weight:500;
  border-bottom:1px solid rgba(0,0,0,.1);
  display:flex;align-items:center;gap:12px;

.panel-back{background:none;border:none;cursor:pointer;color:rgba(75,0,7)}
.panel-back:hover{opacity:.7}

.tool-panel-content{
  padding:16px;display:grid;gap:14px;color: black;

.tool-panel-content img{width:100%;border-radius:10px;cursor:pointer}

.canvas-error{
  position:absolute;
  top:24px;
  left:50%;
  transform:translateX(-50%);
  background:#6b0008;
  color:#fff;
  padding:10px 18px;
  border-radius:10px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:30;
}
.canvas-error.show{
  opacity:1;
}

#floor-layer{
  position:absolute;
  inset:0;
  z-index:2;

#furniture-layer{

  overflow:hidden;
  position:relative;
}

#budgetFill{
  height:100%;
  width:0%;
  border-radius:20px;
  position:relative;

  background:
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.2) 0px,
      rgba(255,255,255,0.2) 8px,
      rgba(255,255,255,0.08) 8px,
      rgba(255,255,255,0.08) 16px
    ),
    linear-gradient(45deg,#4b0007,#a67c2d);

  background-size:40px 40px, 100% 100%;
  animation: moveStripes 2s linear infinite;
  transition: width .4s ease;
}

#budgetPercent{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  font-size:15px;
  color:#fff;
  font-weight:500;
}

@keyframes moveStripes{
  from { background-position: 0 0; }
  to   { background-position: 40px 0; }
}

const canvas=document.getElementById("canvas");
const panel=document.getElementById("toolPanel");

function saveHistory() {
  sessionStorage.setItem("design_draft", JSON.stringify(designState));
  console.log("💾 History saved");
}

//ADD FURNITURE
function addFurniture(src, price, name){
if(!roomReady){
    showCanvasError("Please upload or select a room image first");
    return;
  }
  // 🚫 Budget Check
  if(currentBudgetLimit !== Infinity){
    if(totalUsedBudget + price > currentBudgetLimit){
      showCanvasError("Budget exceeded!");
      return;
    }
  }
  const empty = canvas.querySelector(".empty-state");
  if (empty) empty.remove();
  saveHistory();


  // WRAPPER
  const wrapper = document.createElement("div");
wrapper.className = "canvas-wrapper design-item";
  wrapper.style.left = "440px";
  wrapper.style.top = "220px";
  wrapper.dataset.price = price;

  
  // IMAGE BOX (THIS CLIPS THE COLOR)
  const imageBox = document.createElement("div");
  imageBox.className = "image-box";

  // IMAGE
  const img = document.createElement("img");
  img.src = src;
  img.className = "canvas-item";
  img.style.width = "220px";
  img.style.cursor = "move";
  const itemId = Date.now();
img.dataset.id = itemId;

  // COLOR OVERLAY (ONLY IMAGE SIZE)
  const overlay = document.createElement("div");
  overlay.className = "color-overlay";

  // DELETE BUTTON
  const del = document.createElement("div");
  del.className = "delete-btn";
  del.innerHTML = "&times;";
  del.onclick = (e)=>{
    e.stopPropagation();
totalUsedBudget -= price;
updateBudgetBar();
wrapper.remove();
    selectedItem = null;
    hideColorPalette();
    saveHistory();

  };

  // BUILD STRUCTURE
  imageBox.appendChild(img);
  imageBox.appendChild(overlay);
  wrapper.appendChild(imageBox);
  wrapper.appendChild(del);
document.getElementById("furniture-layer").appendChild(wrapper);
  selectItem(wrapper);

  /// ✅ SAVE ONLY ONCE
const item = {
  id: itemId,
  src,
  name,
  price,
  left: wrapper.style.left,
  top: wrapper.style.top,
  width: img.style.width,
  rotate: 0
};

designState.furniture.push(item); // only this
persistDesignState();

  totalUsedBudget += price;
  updateBudgetBar();

  // DRAG
  img.addEventListener("mousedown", e=>{
    e.stopPropagation();
    selectItem(wrapper);

    const rect = canvas.getBoundingClientRect();
    offsetX = e.clientX - rect.left - wrapper.offsetLeft;
    offsetY = e.clientY - rect.top  - wrapper.offsetTop;

    selectedWrapper.style.left = `${e.clientX - rect.left - offsetX}px`;
selectedWrapper.style.top  = `${e.clientY - rect.top - offsetY}px`;

//START & STOP RESIZE
let startX, startWidth;

function startResize(e){
  e.stopPropagation();
  startX = e.clientX;
  startWidth = selectedItem.getBoundingClientRect().width;

  document.addEventListener("mousemove", resizeItem);
  document.addEventListener("mouseup", stopResize);
}
function resizeItem(e){
  if(!selectedItem) return;

  const dx = e.clientX - startX;
  let newWidth = startWidth + dx;

  // 🔒 limits (tweak freely)
  const MIN = 80;
  const MAX = 900;

  newWidth = Math.max(MIN, Math.min(MAX, newWidth));

  selectedItem.style.width = newWidth + "px";

}
function stopResize(){
  document.removeEventListener("mousemove", resizeItem);
  document.removeEventListener("mouseup", stopResize);

  if (selectedWrapper) {
    updateFurnitureInState(selectedWrapper);
  }
}

//START & STOP ROTATE
let startAngle = 0;
let centerX, centerY;

function startRotate(e){
  e.stopPropagation();

  const rect = selectedItem.getBoundingClientRect();
  centerX = rect.left + rect.width / 2;
  centerY = rect.top + rect.height / 2;

  startAngle = Math.atan2(
    e.clientY - centerY,
    e.clientX - centerX
  );

  document.addEventListener("mousemove", rotateItem);
  document.addEventListener("mouseup", stopRotate);
}

function rotateItem(e){
  if(!selectedItem) return;

  const angle = Math.atan2(
    e.clientY - centerY,
    e.clientX - centerX
  );

  const deg = (angle - startAngle) * (180 / Math.PI);
  const current = selectedItem.dataset.rotate
    ? parseFloat(selectedItem.dataset.rotate)
    : 0;

  const total = current + deg;
  selectedItem.style.transform = `rotate(${total}deg)`;
  selectedItem.dataset.rotate = total;

  startAngle = angle;
}

function stopRotate(){
  document.removeEventListener("mousemove", rotateItem);
  document.removeEventListener("mouseup", stopRotate);

  if(!selectedItem) return;

  // Allowed rotation angles
  const allowedAngles = [0];

  let currentRotation = parseFloat(selectedItem.dataset.rotate) || 0;

  // Normalize angle between 0–360
  currentRotation = ((currentRotation % 360) + 360) % 360;

  // Find nearest allowed angle
  let nearestAngle = allowedAngles.reduce((prev, curr) =>
    Math.abs(curr - currentRotation) < Math.abs(prev - currentRotation)
      ? curr
      : prev
  );

  // 🔒 Snap back to valid angle
  selectedItem.style.transform = `rotate(${nearestAngle}deg)`;
  selectedItem.dataset.rotate = nearestAngle;

  if (selectedWrapper) {
    updateFurnitureInState(selectedWrapper);
  }
}

//ADD + DRAG + STOP
function addRug(src){
  if(!roomReady){
    showCanvasError("Upload a room image first");
    return;
  }

  const floor = document.getElementById("floor-layer");
  const canvasRect = canvas.getBoundingClientRect();

  const rug = document.createElement("img");
  rug.src = src;
  rug.className = "rug-item";

  rug.style.width = "420px";
  rug.style.left = (canvasRect.width / 2 - 210) + "px";
  rug.style.top = (canvasRect.height * 0.68) + "px";
  rug.style.transform = "perspective(800px) rotateX(65deg)";

  let offsetX = 0;
  let offsetY = 0;

  rug.addEventListener("pointerdown", e => {
    e.preventDefault();

    document.querySelectorAll(".rug-item")
      .forEach(r => r.classList.remove("selected"));

    rug.classList.add("selected");

    const rect = rug.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    rug.setPointerCapture(e.pointerId);
  });

  rug.addEventListener("pointermove", e => {
    if(!rug.hasPointerCapture(e.pointerId)) return;

    const canvasRect = canvas.getBoundingClientRect();
    rug.style.left = (e.clientX - canvasRect.left - offsetX) + "px";
    rug.style.top  = (e.clientY - canvasRect.top  - offsetY) + "px";
  });

  rug.addEventListener("pointerup", e => {
    rug.releasePointerCapture(e.pointerId);
  });

  rug.addEventListener("wheel", e => {
    e.preventDefault();
    rug.style.width =
      (rug.offsetWidth + (e.deltaY < 0 ? 20 : -20)) + "px";
  });

  floor.appendChild(rug);

}

function dragRug(e){

}

function stopDragRug(){

  activeRug = null;
}

//UNDO
function undo() {
  if (historyStack.length === 0) return;

  const prev = historyStack.pop();
  designState = JSON.parse(prev);

  selectedWrapper = null;
  selectedItem = null;

  renderCanvas();
}

document.getElementById("undoBtn").addEventListener("click", undo);

const historyStack = [];
const MAX_HISTORY = 30;

function saveHistory() {
  historyStack.push(JSON.stringify(designState));
  if (historyStack.length > MAX_HISTORY) {
    historyStack.shift();
  }
}

    deleteAllItems();

  selectedBudgetTier = null;
  budgetLocked = false;

function updateBudgetBar(){

  const fill = document.getElementById("budgetFill");
  const percentText = document.getElementById("budgetPercent");

  if(!selectedBudgetTier || currentBudgetLimit === Infinity){
    fill.style.width = "0%";
    percentText.innerText = "";
    return;
  }

  const percent = Math.min(
    (totalUsedBudget / currentBudgetLimit) * 100,
    100
  );

  fill.style.width = percent + "%";
  percentText.innerText = Math.round(percent) + "%";

  if(percent < 60){
    fill.style.background =
      "repeating-linear-gradient(45deg,rgba(255,255,255,0.2) 0px,rgba(255,255,255,0.2) 8px,rgba(255,255,255,0.08) 8px,rgba(255,255,255,0.08) 16px),linear-gradient(45deg,#4b0007,#a67c2d)";
  }
  else if(percent < 85){
    fill.style.background =
      "repeating-linear-gradient(45deg,rgba(255,255,255,0.2) 0px,rgba(255,255,255,0.2) 8px,rgba(255,255,255,0.08) 8px,rgba(255,255,255,0.08) 16px),linear-gradient(45deg,#7a0012,#d4af37)";
  }
  else{
    fill.style.background =
      "repeating-linear-gradient(45deg,rgba(255,255,255,0.2) 0px,rgba(255,255,255,0.2) 8px,rgba(255,255,255,0.08) 8px,rgba(255,255,255,0.08) 16px),linear-gradient(45deg,#6b0008,#ffb300)";
  }
}
